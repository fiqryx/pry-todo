services:
  postgres-db:
    image: postgres:16-alpine
    container_name: pry-todo-db
    environment:
      POSTGRES_USER: pry_user
      POSTGRES_PASSWORD: pry_password
      POSTGRES_DB: pry_todo
    # ports:
    #   - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pry-todo-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    depends_on:
      - postgres-db
    volumes:
      - backend_data:/app/data
      - ./backend/.env:/app/.env

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pry-todo-frontend
    ports:
      - "3001:3001"
    env_file:
      - ./frontend/.env
    depends_on:
      - backend
    volumes:
      - ./frontend/.env:/app/.env

volumes:
  pg_data:
  backend_data: